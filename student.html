<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
</head>
<body>

    <h1>Student Form</h1>

    <table border="2">

        <tr>
            <th>Name</th>
            <td><input type="text"></td>
        </tr>

        <tr>
            <th>Age</th>
            <td><input type="number"></td>
        </tr>

        <tr>
            <th>Gender</th>
            <td>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
            </td>
        </tr>

        <tr>
            <th>Course</th>
            <td>
                <select>
                    <option>Java</option>
                    <option>Python</option>
                    <option>C++</option>
                </select>
            </td>
        </tr>

        <tr>
            <th>Email</th>
            <td><input type="email"></td>
        </tr>

        <tr>
            <td>
                <button onclick="save()" id="saveButton">Save</button>
            </td>
        </tr>

    </table> <br><br>
    <table border="2" id="studentTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Course</th>
        <th>Email</th>
    </tr>

    </table>

    <style>
        body{
            background-color: lightblue;
            display: flex;
            flex-direction: column;
            align-items: center;    
          
        }
        #studentTable{
            border-collapse: collapse;
            background-color: rgb(9, 231, 231);
            tab-size: 0dvi;
            font-size: 20px;
          
        }
        #saveButton{
          
            border-collapse: collapse;
            background-color: rgb(69, 231, 0);
            tab-size: 0dvi;
            border: 5px solid black;
          
          
        }
        #studentTable th,#studentTable td{
             padding: 10px
        }
    </style>

    <script>
        function save(){
            var name=document.querySelector("input[type='text']").value;
            var age=document.querySelector("input[type='number']").value;
            var gender=document.querySelector("input[name='gender']:checked").value;
            var course=document.querySelector("select").value;
            var email=document.querySelector("input[type='email']").value;

           var table=document.getElementById("studentTable");
           var row=table.insertRow(-1);
              var cell1=row.insertCell(0);
                var cell2=row.insertCell(1);
                var cell3=row.insertCell(2);
                var cell4=row.insertCell(3);
                var cell5=row.insertCell(4);

                cell1.innerHTML=name;
                cell2.innerHTML=age;
                cell3.innerHTML=gender;
                cell4.innerHTML=course;
                cell5.innerHTML=email;

                document.querySelector("input[type='text']").value = "";
                document.querySelector("input[type='number']").value = "";
                document.querySelector("input[name='gender']").checked = false;
                document.querySelector("select").value = "";
                document.querySelector("input[type='email']").value = "";

        }
    </script>

</body>
</html>
